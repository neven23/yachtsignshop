<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
<title>Admin — YachtSignShop Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0d1b2e;--navy2:#111f30;--navy3:#162033;--navy4:#0a1520;
  --gold:#b8892a;--gold-light:#d4a84b;
  --white:#fff;--green:#2d7a4f;--red:#c0392b;
  --radius:3px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--navy4);color:var(--white);font-family:'DM Sans',sans-serif;line-height:1.5;min-height:100vh;}


/* LOGIN */
.login-screen{min-height:100vh;display:grid;place-items:center;padding:2rem;}
.login-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:6px;padding:2.5rem;width:100%;max-width:380px;text-align:center;}
.login-logo{margin-bottom:1.5rem;}
.login-logo img{height:30px;}
.login-title{font-family:'DM Serif Display',serif;font-size:1.4rem;margin-bottom:0.3rem;}
.login-sub{font-size:0.75rem;color:rgba(255,255,255,0.3);margin-bottom:1.8rem;}
.li-input{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:0.7rem 1rem;font-family:'DM Sans',sans-serif;font-size:0.88rem;color:var(--white);width:100%;outline:none;transition:border-color 0.15s;margin-bottom:0.8rem;text-align:center;letter-spacing:0.08em;}
.li-input:focus{border-color:var(--gold);}
.li-btn{width:100%;background:var(--gold);color:var(--white);border:none;padding:0.75rem;font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:600;letter-spacing:0.05em;border-radius:var(--radius);cursor:pointer;transition:background 0.2s;}
.li-btn:hover{background:var(--gold-light);}
.li-error{color:#e88;font-size:0.75rem;margin-top:0.6rem;display:none;}


/* MAIN LAYOUT */
.admin-wrap{display:none;min-height:100vh;}
.sidebar{width:220px;background:var(--navy2);border-right:1px solid rgba(255,255,255,0.06);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;padding:1.5rem 0;}
