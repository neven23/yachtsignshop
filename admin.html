<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — YachtSignShop Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0d1b2e;--navy2:#111f30;--navy3:#162033;--navy4:#0a1520;
  --gold:#b8892a;--gold-light:#d4a84b;
  --white:#fff;--green:#2d7a4f;--red:#c0392b;
  --radius:3px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--navy4);color:var(--white);font-family:'DM Sans',sans-serif;line-height:1.5;min-height:100vh;}

/* LOGIN */
.login-screen{min-height:100vh;display:grid;place-items:center;padding:2rem;}
.login-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:6px;padding:2.5rem;width:100%;max-width:380px;text-align:center;}
.login-logo{margin-bottom:1.5rem;}
.login-logo img{height:30px;}
.login-title{font-family:'DM Serif Display',serif;font-size:1.4rem;margin-bottom:0.3rem;}
.login-sub{font-size:0.75rem;color:rgba(255,255,255,0.3);margin-bottom:1.8rem;}
.li-input{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:0.7rem 1rem;font-family:'DM Sans',sans-serif;font-size:0.88rem;color:var(--white);width:100%;outline:none;transition:border-color 0.15s;margin-bottom:0.8rem;text-align:center;letter-spacing:0.08em;}
.li-input:focus{border-color:var(--gold);}
.li-btn{width:100%;background:var(--gold);color:var(--white);border:none;padding:0.75rem;font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:600;letter-spacing:0.05em;border-radius:var(--radius);cursor:pointer;transition:background 0.2s;}
.li-btn:hover{background:var(--gold-light);}
.li-error{color:#e88;font-size:0.75rem;margin-top:0.6rem;display:none;}

/* MAIN LAYOUT */
.admin-wrap{display:none;min-height:100vh;}
.sidebar{width:220px;background:var(--navy2);border-right:1px solid rgba(255,255,255,0.06);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;padding:1.5rem 0;}
.sb-logo{padding:0 1.4rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.06);}
.sb-logo img{height:26px;}
.sb-nav{flex:1;padding:1rem 0;}
.sb-item{display:flex;align-items:center;gap:0.6rem;padding:0.6rem 1.4rem;font-size:0.78rem;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.15s;border-left:2px solid transparent;}
.sb-item:hover{color:var(--white);background:rgba(255,255,255,0.04);}
.sb-item.active{color:var(--white);border-left-color:var(--gold);background:rgba(184,137,42,0.07);}
.sb-section{font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.18);padding:0.8rem 1.4rem 0.3rem;}
.sb-bottom{padding:1rem 1.4rem;border-top:1px solid rgba(255,255,255,0.06);}
.sb-logout{font-size:0.72rem;color:rgba(255,255,255,0.28);cursor:pointer;transition:color 0.15s;}
.sb-logout:hover{color:var(--white);}

.main-content{margin-left:220px;padding:2rem 2.5rem;min-height:100vh;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
.page-title{font-family:'DM Serif Display',serif;font-size:1.6rem;font-weight:400;}
.page-title em{font-style:italic;color:var(--gold-light);}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
.stat-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:4px;padding:1.2rem 1.4rem;}
.sc-val{font-family:'DM Serif Display',serif;font-size:1.8rem;font-style:italic;color:var(--white);line-height:1;}
.sc-lbl{font-size:0.65rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.28);margin-top:0.3rem;}
.sc-accent{color:var(--gold);}

/* ORDERS TABLE */
.table-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:4px;overflow:hidden;}
.table-toolbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.4rem;border-bottom:1px solid rgba(255,255,255,0.06);flex-wrap:wrap;gap:0.8rem;}
.tt-filters{display:flex;gap:0.5rem;flex-wrap:wrap;}
.filter-btn{background:none;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);padding:0.3rem 0.75rem;font-family:'DM Sans',sans-serif;font-size:0.7rem;border-radius:20px;cursor:pointer;transition:all 0.15s;}
.filter-btn:hover,.filter-btn.active{background:rgba(184,137,42,0.12);border-color:rgba(184,137,42,0.35);color:var(--gold);}
.btn-new{background:var(--gold);color:var(--white);border:none;padding:0.45rem 1.1rem;font-family:'DM Sans',sans-serif;font-size:0.72rem;font-weight:600;border-radius:var(--radius);cursor:pointer;transition:background 0.2s;display:flex;align-items:center;gap:0.4rem;}
.btn-new:hover{background:var(--gold-light);}
table{width:100%;border-collapse:collapse;}
th{font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.25);padding:0.65rem 1rem;text-align:left;border-bottom:1px solid rgba(255,255,255,0.06);white-space:nowrap;}
td{padding:0.85rem 1rem;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.78rem;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}
.td-num{font-family:monospace;letter-spacing:0.05em;color:var(--gold-light);font-size:0.76rem;}
.td-name{font-weight:500;}
.td-email{color:rgba(255,255,255,0.4);font-size:0.72rem;}
.td-meta{color:rgba(255,255,255,0.35);font-size:0.72rem;}
.td-actions{display:flex;gap:0.5rem;white-space:nowrap;}
.act-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);padding:0.3rem 0.6rem;font-family:'DM Sans',sans-serif;font-size:0.68rem;border-radius:var(--radius);cursor:pointer;transition:all 0.15s;}
.act-btn:hover{background:rgba(255,255,255,0.1);color:var(--white);}
.act-btn.update{border-color:rgba(184,137,42,0.3);color:var(--gold);}
.act-btn.update:hover{background:rgba(184,137,42,0.12);}
.empty-state{text-align:center;padding:3rem;color:rgba(255,255,255,0.2);font-size:0.82rem;}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:0.3rem;padding:0.22rem 0.6rem;border-radius:12px;font-size:0.65rem;font-weight:600;letter-spacing:0.04em;white-space:nowrap;}
.badge-proof_pending{background:rgba(184,137,42,0.15);color:#d4a84b;}
.badge-proof_sent{background:rgba(66,153,225,0.15);color:#63b3ed;}
.badge-approved{background:rgba(72,187,120,0.15);color:#68d391;}
.badge-in_production{background:rgba(237,137,54,0.15);color:#fbd38d;}
.badge-quality_check{background:rgba(159,122,234,0.15);color:#d6bcfa;}
.badge-shipped{background:rgba(49,196,141,0.15);color:#4fd1c5;}
.badge-delivered{background:rgba(45,122,79,0.2);color:#68d391;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:var(--navy2);border:1px solid rgba(255,255,255,0.1);border-radius:6px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.modal-header{padding:1.4rem 1.6rem;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'DM Serif Display',serif;font-size:1.1rem;font-weight:400;}
.modal-close{background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:1.3rem;line-height:1;padding:0.1rem 0.3rem;transition:color 0.15s;}
.modal-close:hover{color:var(--white);}
.modal-body{padding:1.6rem;}
.mf-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.mf-row.full{grid-template-columns:1fr;}
.mf-field{display:flex;flex-direction:column;gap:0.35rem;}
.mf-label{font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.35);}
.mf-input,.mf-select,.mf-textarea{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius);padding:0.6rem 0.85rem;font-family:'DM Sans',sans-serif;font-size:0.82rem;color:var(--white);width:100%;outline:none;transition:border-color 0.15s;}
.mf-input:focus,.mf-select:focus,.mf-textarea:focus{border-color:var(--gold);}
.mf-select option{background:var(--navy2);color:var(--white);}
.mf-textarea{resize:vertical;min-height:70px;line-height:1.5;}
.modal-footer{padding:1rem 1.6rem;border-top:1px solid rgba(255,255,255,0.07);display:flex;justify-content:flex-end;gap:0.6rem;}
.btn-cancel{background:none;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.4);padding:0.55rem 1.2rem;font-family:'DM Sans',sans-serif;font-size:0.78rem;border-radius:var(--radius);cursor:pointer;transition:all 0.15s;}
.btn-cancel:hover{border-color:rgba(255,255,255,0.25);color:var(--white);}
.btn-save{background:var(--gold);color:var(--white);border:none;padding:0.55rem 1.4rem;font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:600;border-radius:var(--radius);cursor:pointer;transition:background 0.2s;}
.btn-save:hover{background:var(--gold-light);}
.btn-save:disabled{opacity:0.5;cursor:not-allowed;}
.modal-section{font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.2);margin:1.2rem 0 0.6rem;padding-bottom:0.4rem;border-bottom:1px solid rgba(255,255,255,0.05);}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a2e1a;border:1px solid rgba(45,122,79,0.5);color:#68d391;padding:0.7rem 1.2rem;border-radius:var(--radius);font-size:0.78rem;font-weight:500;z-index:600;opacity:0;transform:translateY(8px);transition:all 0.25s;pointer-events:none;}
.toast.show{opacity:1;transform:none;}
.toast.error{background:#2e1a1a;border-color:rgba(192,57,43,0.5);color:#e88;}

/* Loading */
.loading-row td{text-align:center;padding:2rem;color:rgba(255,255,255,0.2);font-size:0.78rem;}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle;margin-right:0.4rem;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

<script>
const STATUS_LABELS = {
  proof_pending:'Order Received', proof_sent:'Proof Sent', approved:'Design Approved',
  in_production:'In Production', quality_check:'Quality Check', shipped:'Shipped', delivered:'Delivered'
};

let ADMIN_KEY = '';
let allOrders = [];
let currentFilter = 'all';

// ── AUTH ──
function doLogin() {
  const key = document.getElementById('keyInput').value.trim();
  if (!key) return;
  ADMIN_KEY = key;
  document.getElementById('loginError').style.display = 'none';
  loadOrders();
}
document.getElementById('keyInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
function doLogout() {
  ADMIN_KEY = '';
  allOrders = [];
  document.getElementById('adminWrap').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'grid';
  document.getElementById('keyInput').value = '';
}

// ── DATA ──
async function loadOrders() {
  try {
    const res = await fetch('/.netlify/functions/admin-order', {
      headers: { 'X-Admin-Key': ADMIN_KEY }
    });
    if (res.status === 401) {
      document.getElementById('loginError').style.display = 'block';
      ADMIN_KEY = '';
      return;
    }
    const data = await res.json();
    allOrders = Array.isArray(data) ? data : [];
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'flex';
    updateStats();
    renderTable();
  } catch(e) {
    document.getElementById('loginError').textContent = 'Connection error. Check your network.';
    document.getElementById('loginError').style.display = 'block';
  }
}

function updateStats() {
  document.getElementById('st-total').textContent = allOrders.length;
  document.getElementById('st-active').textContent = allOrders.filter(o => ['approved','in_production','quality_check'].includes(o.status)).length;
  document.getElementById('st-shipped').textContent = allOrders.filter(o => o.status === 'shipped').length;
  document.getElementById('st-delivered').textContent = allOrders.filter(o => o.status === 'delivered').length;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function renderTable() {
  const filtered = currentFilter === 'all' ? allOrders : allOrders.filter(o => o.status === currentFilter);
  const tbody = document.getElementById('ordersBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">No orders found</div></td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(o => {
    const d = new Date(o.created_at);
    const dateStr = d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
    const meta = [o.material, o.size].filter(Boolean).join(' · ');
    return `<tr>
      <td><div class="td-num">${o.order_number}</div></td>
      <td><div class="td-name">${esc(o.customer_name || '—')}</div><div class="td-email">${esc(o.email)}</div></td>
      <td><div class="td-name">${esc(o.sign_name || '—')}</div><div class="td-meta">${esc(meta)}</div></td>
      <td><span class="badge badge-${o.status}">${STATUS_LABELS[o.status] || o.status}</span></td>
      <td class="td-meta">${dateStr}</td>
      <td><div class="td-actions">
        <button class="act-btn update" onclick="openUpdateModal(${JSON.stringify(o).replace(/"/g, '&quot;')})">Update</button>
        <a href="track.html?order=${encodeURIComponent(o.order_number)}&email=${encodeURIComponent(o.email)}" target="_blank"><button class="act-btn">Preview</button></a>
      </div></td>
    </tr>`;
  }).join('');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── CREATE ──
function openCreateModal() {
  ['c-num','c-name','c-email','c-sign','c-material','c-size','c-eta'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('createModal').classList.add('open');
}

async function createOrder() {
  const btn = document.getElementById('createSaveBtn');
  const num = document.getElementById('c-num').value.trim().toUpperCase();
  const email = document.getElementById('c-email').value.trim();
  if (!num || !email) { showToast('Order number and email are required', true); return; }
  btn.disabled = true; btn.textContent = 'Creating...';
  try {
    const res = await fetch('/.netlify/functions/admin-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': ADMIN_KEY },
      body: JSON.stringify({
        action: 'create',
        order_number: num,
        email,
        customer_name: document.getElementById('c-name').value.trim(),
        sign_name: document.getElementById('c-sign').value.trim(),
        material: document.getElementById('c-material').value.trim(),
        size: document.getElementById('c-size').value.trim(),
        estimated_ship_date: document.getElementById('c-eta').value || null,
      })
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Failed'); }
    closeModal('createModal');
    showToast('Order created successfully');
    await loadOrders();
  } catch(e) {
    showToast(e.message, true);
  } finally { btn.disabled = false; btn.textContent = 'Create Order'; }
}

// ── UPDATE ──
function openUpdateModal(order) {
  document.getElementById('u-num').value = order.order_number;
  document.getElementById('u-orderNum').textContent = order.order_number;
  document.getElementById('u-status').value = order.status;
  document.getElementById('u-msg').value = order.status_message || '';
  document.getElementById('u-note').value = '';
  document.getElementById('u-proof').value = order.proof_url || '';
  document.getElementById('u-tracking').value = order.tracking_number || '';
  document.getElementById('u-trackurl').value = order.tracking_url || '';
  document.getElementById('u-eta').value = order.estimated_ship_date ? order.estimated_ship_date.split('T')[0] : '';
  document.getElementById('updateModal').classList.add('open');
}

async function updateOrder() {
  const btn = document.getElementById('updateSaveBtn');
  const num = document.getElementById('u-num').value;
  const status = document.getElementById('u-status').value;
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const res = await fetch('/.netlify/functions/admin-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': ADMIN_KEY },
      body: JSON.stringify({
        action: 'update',
        order_number: num,
        status,
        status_message: document.getElementById('u-msg').value.trim(),
        note: document.getElementById('u-note').value.trim(),
        proof_url: document.getElementById('u-proof').value.trim() || null,
        tracking_number: document.getElementById('u-tracking').value.trim() || null,
        tracking_url: document.getElementById('u-trackurl').value.trim() || null,
        estimated_ship_date: document.getElementById('u-eta').value || null,
      })
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Failed'); }
    closeModal('updateModal');
    showToast('Order updated');
    await loadOrders();
  } catch(e) {
    showToast(e.message, true);
  } finally { btn.disabled = false; btn.textContent = 'Save Update'; }
}

// ── UTILS ──
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showView(v) {
  document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
  event.currentTarget.classList.add('active');
}
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});
</script>
