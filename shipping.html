<style>
:root{
  --navy:#0d1b2e;--navy2:#111f30;
  --gold:#b8892a;--gold-light:#d4a84b;
  --white:#fff;--radius:3px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--navy);color:var(--white);font-family:'DM Sans',sans-serif;line-height:1.7;}
.nav{background:rgba(13,27,46,0.97);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;}
.nav-logo img{height:34px;display:block;}
.nav-right{display:flex;align-items:center;gap:1.2rem;}
.nav-back{font-size:0.73rem;color:rgba(255,255,255,0.45);text-decoration:none;letter-spacing:0.03em;transition:color 0.15s;}
.nav-back:hover{color:var(--white);}
.nav-cta{background:var(--gold);color:var(--white);padding:0.48rem 1.2rem;font-size:0.73rem;font-weight:600;border-radius:var(--radius);text-decoration:none;letter-spacing:0.03em;transition:background 0.2s;}
.nav-cta:hover{background:var(--gold-light);}
.page-hero{padding:4.5rem 2rem 3rem;text-align:center;position:relative;overflow:hidden;}
.page-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 80%,rgba(184,137,42,0.07) 0%,transparent 70%);pointer-events:none;}
.hero-eye{font-size:0.6rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:1.2rem;display:flex;align-items:center;justify-content:center;gap:0.8rem;}
.hero-eye::before,.hero-eye::after{content:'';width:36px;height:1px;background:var(--gold);opacity:0.4;}
.page-h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,5vw,3rem);font-weight:400;line-height:1.1;margin-bottom:0.9rem;}
.page-h1 em{font-style:italic;color:var(--gold-light);}
.page-sub{font-size:0.85rem;color:rgba(255,255,255,0.35);max-width:480px;margin:0 auto;}
.doc-wrap{max-width:780px;margin:0 auto;padding:3rem 2rem 6rem;}
.doc-updated{font-size:0.72rem;color:rgba(255,255,255,0.25);margin-bottom:2.5rem;padding-bottom:1rem;border-bottom:1px solid rgba(255,255,255,0.07);}
.doc-section{margin-bottom:2.5rem;}
