[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."fal-proxy"]
  timeout = 26

[functions."claude-proxy"]
  timeout = 30

# ===== Blog redirects =====
[[redirects]]
  from = "/blog"
  to = "/blog/index.html"
  status = 200

# ===== SEO: Clean URL redirects (remove .html extensions) =====
[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/craft"
  to = "/craft.html"
  status = 200

[[redirects]]
  from = "/how-it-works"
  to = "/how-it-works.html"
  status = 200

[[redirects]]
  from = "/installation"
  to = "/installation.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/shipping"
  to = "/shipping.html"
  status = 200

[[redirects]]
  from = "/returns"
  to = "/returns.html"
  status = 200

[[redirects]]
  from = "/track"
  to = "/track.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/led-yacht-signs"
  to = "/led-yacht-signs.html"
  status = 200

# ===== API proxy redirects =====
[[redirects]]
  from = "/api/fal-proxy"
  to = "/.netlify/functions/fal-proxy"
  status = 200

[[redirects]]
  from = "/api/claude-proxy"
  to = "/.netlify/functions/claude-proxy"
  status = 200

[[redirects]]
  from = "/api/send-order-email"
  to = "/.netlify/functions/send-order-email"
  status = 200

[[redirects]]
  from = "/api/send-shipping-email"
  to = "/.netlify/functions/send-shipping-email"
  status = 200

# ===== SEO Headers =====
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og-image.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/hero-video.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
