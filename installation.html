<style>
:root {
  --cream:#f8f5f0; --cream2:#f0ece4; --sand:#e8e0d4;
  --navy:#0d1b2e; --navy2:#162033;
  --gold:#b8892a; --gold-light:#d4a84b; --gold-pale:#f5ecd7;
  --text:#1a1a1a; --text-mid:#4a4a4a; --text-light:#888;
  --border:#ddd6cc;
  --white:#ffffff; --green:#2d7a4f;
  --radius:3px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--navy);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:400;line-height:1.6;}


/* NAV */
.nav{background:rgba(13,27,46,0.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;}
.nav-logo{display:flex;align-items:center;}
.nav-logo-img{height:34px;width:auto;display:block;}
.nav-right{display:flex;align-items:center;gap:1.2rem;}
.nav-back{font-size:0.75rem;color:rgba(255,255,255,0.55);text-decoration:none;letter-spacing:0.03em;transition:color 0.15s;display:flex;align-items:center;gap:0.4rem;}
.nav-back:hover{color:var(--white);}
.nav-cta{background:var(--gold);color:var(--white);border:none;padding:0.5rem 1.3rem;font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:600;cursor:pointer;border-radius:var(--radius);text-decoration:none;letter-spacing:0.03em;transition:background 0.2s;}
.nav-cta:hover{background:var(--gold-light);}


/* PAGE HERO */
.page-hero{padding:5rem 2rem 4rem;text-align:center;position:relative;overflow:hidden;}
